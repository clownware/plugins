<!-- @dsCard group="Components" viewport="700x230" name="Buttons" subtitle="Button variants, sizes, icon buttons" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  html,body{margin:0}
  body{background:hsl(var(--bg-app)); padding:var(--space-6); box-sizing:border-box; font-family:var(--font-ui);}
  .sect{display:flex; flex-direction:column; gap:14px;}
  .row{display:flex; gap:12px; align-items:center; flex-wrap:wrap;}
  .lbl{font:var(--type-meta); color:hsl(var(--text-muted)); letter-spacing:var(--tracking-wide); text-transform:uppercase; width:88px; flex:none;}
  .line{display:flex; gap:12px; align-items:center;}
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel" data-presets="react">
    const { Button, IconButton } = window.PezzaDesignSystem_8fc740;
    const Play = () => <svg width="15" height="15" viewBox="0 0 16 16" fill="currentColor"><path d="M4 3l9 5-9 5V3z"/></svg>;
    const Plus = () => <svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round"><path d="M8 3v10M3 8h10"/></svg>;
    const Heart = () => <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M8 13.5S2.5 10 2.5 6.2A2.7 2.7 0 0 1 8 5a2.7 2.7 0 0 1 5.5 1.2C13.5 10 8 13.5 8 13.5z"/></svg>;
    function Demo(){
      return (
        <div className="sect">
          <div className="row"><span className="lbl">Variants</span>
            <Button variant="primary">Save changes</Button>
            <Button variant="secondary">Cancel</Button>
            <Button variant="ghost">Skip</Button>
            <Button variant="accent" iconLeft={<Play/>}>Play set</Button>
          </div>
          <div className="row"><span className="lbl">Sizes</span>
            <Button size="sm">Small</Button>
            <Button size="md">Medium</Button>
            <Button size="lg" iconLeft={<Plus/>}>Large</Button>
          </div>
          <div className="row"><span className="lbl">States</span>
            <Button>Default</Button>
            <Button disabled>Disabled</Button>
            <Button variant="secondary" iconRight={<Play/>}>With icon</Button>
          </div>
          <div className="row"><span className="lbl">Icon btns</span>
            <div className="line">
              <IconButton label="Play" variant="solid"><Play/></IconButton>
              <IconButton label="Add" variant="outline"><Plus/></IconButton>
              <IconButton label="Like" variant="ghost"><Heart/></IconButton>
              <IconButton label="Like" active><Heart/></IconButton>
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
  </script>
</body>
</html>
