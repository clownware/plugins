<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  html,body{margin:0}
  body{background:var(--bg-app); padding:var(--space-6); box-sizing:border-box; font-family:var(--font-ui);}
  .grid{display:grid; grid-template-columns:1fr 1fr; gap:var(--space-6) var(--space-7); max-width:620px;}
  .field{display:flex; flex-direction:column; gap:8px;}
  .lbl{font:var(--type-meta); color:var(--text-muted); letter-spacing:var(--tracking-wide); text-transform:uppercase;}
  .stack{display:flex; flex-direction:column; gap:14px;}
  .row{display:flex; gap:14px; align-items:center;}
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel" data-presets="react">
    const { Input, Select, Switch, Checkbox } = window.PezzaDesignSystem_8fc740;
    function Demo(){
      const [a,setA]=React.useState(true);
      const [b,setB]=React.useState(false);
      const [c,setC]=React.useState(true);
      return (
        <div className="grid">
          <div className="field">
            <span className="lbl">Search</span>
            <Input placeholder="Search pantry…" />
          </div>
          <div className="field">
            <span className="lbl">Tempo</span>
            <Input mono suffix="BPM" defaultValue="124" />
          </div>
          <div className="field">
            <span className="lbl">Background</span>
            <Select defaultValue="g" style={{width:'100%'}}>
              <option value="g">Galaxy</option>
              <option value="d">Desert</option>
              <option value="s">Sunset</option>
            </Select>
          </div>
          <div className="field">
            <span className="lbl">Error state</span>
            <Input invalid placeholder="Required field" />
          </div>
          <div className="field">
            <span className="lbl">Toggles</span>
            <div className="stack">
              <Switch checked={a} onChange={setA} label="Low-stock alerts" />
              <Switch checked={b} onChange={setB} label="Auto-add staples" />
            </div>
          </div>
          <div className="field">
            <span className="lbl">Checkboxes</span>
            <div className="stack">
              <Checkbox checked={c} onChange={setC} label="Mark restocked" />
              <Checkbox checked={false} label="Hide expired" />
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
  </script>
</body>
</html>
