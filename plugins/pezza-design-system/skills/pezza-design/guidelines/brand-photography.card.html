<!-- @dsCard group="Brand" viewport="700x230" name="Emblem on Photography" subtitle="One white mark over rotating photographic backgrounds" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  html,body{margin:0;height:100%}
  body{display:grid; grid-template-columns:repeat(4,1fr); gap:var(--space-3);
    padding:var(--space-4); box-sizing:border-box; background:var(--ink-100);}
  .tile{position:relative; border-radius:var(--radius-md); overflow:hidden;
    aspect-ratio:1/1; display:grid; place-items:center;}
  .tile img.bg{position:absolute; inset:0; width:100%; height:100%; object-fit:cover;}
  .tile .mk{position:relative; height:38px; filter:drop-shadow(0 1px 6px rgba(0,0,0,.35));}
</style>
</head>
<body>
  <div class="tile"><img class="bg" src="../assets/img/bg-galaxy.jpg" alt="" /><img class="mk" src="../assets/logo/emblem-white.png" alt=""/></div>
  <div class="tile"><img class="bg" src="../assets/img/bg-desert.jpg" alt="" /><img class="mk" src="../assets/logo/emblem-white.png" alt=""/></div>
  <div class="tile"><img class="bg" src="../assets/img/bg-sunset.jpg" alt="" /><img class="mk" src="../assets/logo/emblem-white.png" alt=""/></div>
  <div class="tile" style="background:var(--ink-1000)"><img class="mk" src="../assets/logo/emblem-white.png" alt=""/></div>
</body>
</html>
