<!-- @dsCard group="Spacing" viewport="700x170" name="Radius & Shadow" subtitle="Restrained rounding, minimal elevation — depth from contrast" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  html,body{margin:0}
  body{background:var(--ink-50); font-family:var(--font-mono); padding:var(--space-5); box-sizing:border-box;
    display:flex; gap:var(--space-5); align-items:center;}
  .group{display:flex; gap:var(--space-4); align-items:flex-end;}
  .item{display:flex; flex-direction:column; align-items:center; gap:8px;}
  .box{width:60px; height:60px; background:var(--ink-0); border:1px solid var(--ink-150);}
  .lbl{font-size:9px; color:var(--ink-500); letter-spacing:.04em;}
  .sep{width:1px; align-self:stretch; background:var(--ink-150); margin:0 6px;}
</style>
</head>
<body>
  <div class="group">
    <div class="item"><div class="box" style="border-radius:var(--radius-xs)"></div><span class="lbl">xs · 3</span></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-sm)"></div><span class="lbl">sm · 6</span></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-md)"></div><span class="lbl">md · 10</span></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-lg)"></div><span class="lbl">lg · 16</span></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-round)"></div><span class="lbl">round</span></div>
  </div>
  <div class="sep"></div>
  <div class="group">
    <div class="item"><div class="box" style="border-radius:8px;box-shadow:var(--shadow-sm);border:0"></div><span class="lbl">sm</span></div>
    <div class="item"><div class="box" style="border-radius:8px;box-shadow:var(--shadow-md);border:0"></div><span class="lbl">md</span></div>
    <div class="item"><div class="box" style="border-radius:8px;box-shadow:var(--shadow-lg);border:0"></div><span class="lbl">lg</span></div>
    <div class="item"><div class="box" style="border-radius:8px;box-shadow:var(--glow-accent);border:0;background:var(--ink-900)"></div><span class="lbl">glow</span></div>
  </div>
</body>
</html>
