<!-- @dsCard group="Type" viewport="700x180" name="Body & UI" subtitle="Space Grotesk at text sizes — readable, idiosyncratic" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  html,body{margin:0}
  body{background:hsl(var(--ink-0)); padding:var(--space-5) var(--space-6); box-sizing:border-box; display:flex; gap:var(--space-7);}
  .col{flex:1;}
  .spec{font:var(--type-meta); color:hsl(var(--ink-400)); margin-bottom:6px;}
  .lead{font-family:var(--font-ui); font-size:var(--text-2xl); color:hsl(var(--ink-1000)); line-height:var(--leading-snug); margin:0 0 12px;}
  .body{font-family:var(--font-ui); font-size:var(--text-xl); color:hsl(var(--ink-800)); line-height:var(--leading-normal); margin:0;}
  .small{font-family:var(--font-ui); font-size:var(--text-lg); color:hsl(var(--ink-500)); margin-top:10px;}
</style>
</head>
<body>
  <div class="col">
    <div class="spec">LEAD · 18 / 1.18</div>
    <p class="lead">Track your pantry like you track a set — by what's about to drop out.</p>
    <p class="body">Body copy runs in Space Grotesk at 16px with generous 1.5 line height. The typeface stays geometric but its <em>a</em> and <em>G</em> keep things human, not corporate.</p>
    <p class="small">Secondary / 14 — muted ink for captions and helper text.</p>
  </div>
</body>
</html>
