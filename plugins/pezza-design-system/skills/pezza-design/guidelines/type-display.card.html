<!-- @dsCard group="Type" viewport="700x230" name="Display · Space Grotesk" subtitle="Geometric grotesque — echoes the mark's construction" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  html,body{margin:0}
  body{background:hsl(var(--ink-0)); padding:var(--space-5) var(--space-6); box-sizing:border-box;}
  .row{display:flex; align-items:baseline; gap:var(--space-4); padding:6px 0; border-bottom:1px solid hsl(var(--ink-100));}
  .row:last-child{border:0;}
  .spec{font:var(--type-meta); color:hsl(var(--ink-400)); width:120px; flex:none;}
  .d{font-family:var(--font-display); color:hsl(var(--ink-1000)); line-height:1;}
</style>
</head>
<body>
  <div class="row"><span class="spec">Display · 64 · 700</span><span class="d" style="font-size:44px;font-weight:700;letter-spacing:-.02em">Crossfade</span></div>
  <div class="row"><span class="spec">Title · 44 · 600</span><span class="d" style="font-size:32px;font-weight:600">Pantry &amp; Sets</span></div>
  <div class="row"><span class="spec">Heading · 32 · 600</span><span class="d" style="font-size:24px;font-weight:600">What's running low</span></div>
  <div class="row"><span class="spec">Wordmark · caps</span><span class="d" style="font-size:24px;font-weight:700;letter-spacing:.18em">PEZZA</span></div>
</body>
</html>
