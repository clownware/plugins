<!-- @dsCard group="Type" viewport="700x200" name="Metadata · Space Mono" subtitle="The technical layer — BPM, key, catalog, tracklists, credits" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  html,body{margin:0}
  body{background:hsl(var(--ink-1000)); color:hsl(var(--ink-150)); font-family:var(--font-mono);
    padding:var(--space-5) var(--space-6); box-sizing:border-box;}
  .tl{display:flex; flex-direction:column; gap:9px; font-size:var(--text-lg); letter-spacing:var(--tracking-mono);}
  .tr{display:grid; grid-template-columns:28px 1fr 64px 52px; gap:var(--space-4); align-items:center;}
  .idx{color:hsl(var(--ink-500));}
  .nm{color:hsl(var(--ink-0));}
  .bpm{color:hsl(var(--accent)); text-align:right;}
  .key{color:hsl(var(--ink-300)); text-align:right;}
  .cat{margin-top:14px; font-size:var(--text-sm); color:hsl(var(--ink-500)); letter-spacing:.12em;}
</style>
</head>
<body>
  <div class="tl">
    <div class="tr"><span class="idx">01</span><span class="nm">Subsurface — Original Mix</span><span class="bpm">124 BPM</span><span class="key">A♭ min</span></div>
    <div class="tr"><span class="idx">02</span><span class="nm">Ice VIII (Pezza Edit)</span><span class="bpm">126 BPM</span><span class="key">F maj</span></div>
    <div class="tr"><span class="idx">03</span><span class="nm">Galaxy Bleed</span><span class="bpm">128 BPM</span><span class="key">C min</span></div>
  </div>
  <div class="cat">CAT# PZA-007 · MASTERED 2026-03-11 · 24BIT/44.1K</div>
</body>
</html>
